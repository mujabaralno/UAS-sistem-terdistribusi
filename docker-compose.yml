# ============================================================
#  docker-compose.yml
#  Menjalankan DUA container terpisah:
#   - server  : REST API (Express + TypeScript)  -> port 3000
#   - client  : Frontend (React + Vite, via Nginx) -> port 8080
#  Keduanya membuktikan konsep sistem terdistribusi:
#  dua proses terpisah yang berkomunikasi lewat HTTP (REST API).
# ============================================================

services:
  # ----- CONTAINER SERVER -----
  server:
    build: ./server
    container_name: tiket-server
    ports:
      - "3000:3000"          # API dapat diakses di http://localhost:3000
    networks:
      - jaringan-tiket

  # ----- CONTAINER CLIENT (FRONTEND) -----
  client:
    build:
      context: ./client
      args:
        # Frontend berjalan di BROWSER, jadi memanggil port server
        # yang dipetakan ke laptop (host), bukan nama service Docker.
        VITE_API_URL: http://localhost:3000
    container_name: tiket-client
    ports:
      - "8080:80"            # buka aplikasi di http://localhost:8080
    depends_on:
      - server
    networks:
      - jaringan-tiket

networks:
  jaringan-tiket:
    driver: bridge
